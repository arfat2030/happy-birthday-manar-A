<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Cinematic Birthday · Manar</title>
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
  <!-- GSAP & Plugins -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
  <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.16"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #03030a;
      overflow-x: hidden;
      font-family: 'Inter', sans-serif;
      cursor: default;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* Canvas layers for depth */
    #galaxy-canvas, #particle-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    main {
      position: relative;
      z-index: 10;
      width: 100%;
      min-height: 100vh;
    }

    /* Glassmorphism card base */
    .glass-panel {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,215,0,0.2);
      border-radius: 2.5rem;
      padding: 2rem;
      color: #f8f3e6;
    }

    .scene {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 2rem;
      position: relative;
    }

    h1, h2, .elegant-text {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      letter-spacing: 0.05em;
    }

    button, .interactive {
      cursor: pointer;
      transition: transform 0.3s ease, filter 0.3s ease;
    }

    button:hover, .interactive:hover {
      transform: scale(1.02);
      filter: brightness(1.2);
    }

    /* Heart portal styles */
    #heartCanvas {
      width: 280px;
      height: 280px;
      max-width: 70vw;
      max-height: 70vw;
      border-radius: 50%;
      background: transparent;
      cursor: pointer;
      filter: drop-shadow(0 0 40px rgba(255, 80, 120, 0.7));
      transition: filter 0.3s;
    }

    .hidden {
      display: none !important;
    }

    .flex-center {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    @media (max-width: 600px) {
      .glass-panel {
        padding: 1.5rem;
        border-radius: 2rem;
      }
    }
  </style>
</head>
<body>
  <canvas id="galaxy-canvas"></canvas>
  <canvas id="particle-canvas"></canvas>
  <main id="app">
    <!-- Scenes injected dynamically but structure kept consistent -->
  </main>

  <script>
    (function() {
      // ═══════════════════════════════════════
      // PREMIUM CINEMATIC BIRTHDAY EXPERIENCE
      // ═══════════════════════════════════════

      // ──────────────── GLOBAL STATE ────────────────
      const APP = document.getElementById('app');
      const galaxyCanvas = document.getElementById('galaxy-canvas');
      const particleCanvas = document.getElementById('particle-canvas');
      const ctxGalaxy = galaxyCanvas.getContext('2d');
      const ctxParticles = particleCanvas.getContext('2d');
      
      let width, height;
      let animationFrame;
      let galaxyStars = [];
      let shootingStars = [];
      let nebulaParticles = [];
      let auroraPoints = [];
      
      // Audio context for subtle sound effects (created on user gesture)
      let audioCtx = null;
      
      function initAudio() {
        if (audioCtx) return;
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch (e) {
          console.log("Audio not supported");
        }
      }
      
      function playTone(freq, type = 'sine', duration = 0.15, vol = 0.08) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      }
      
      function heartbeatSound() {
        playTone(80, 'sine', 0.2, 0.1);
        setTimeout(() => playTone(90, 'sine', 0.15, 0.08), 150);
      }

      // ──────────────── RESIZE ────────────────
      function resizeCanvases() {
        width = window.innerWidth;
        height = window.innerHeight;
        galaxyCanvas.width = width;
        galaxyCanvas.height = height;
        particleCanvas.width = width;
        particleCanvas.height = height;
        initGalaxyBackground();
      }

      // ──────────────── GALAXY BACKGROUND ────────────────
      function initGalaxyBackground() {
        galaxyStars = [];
        nebulaParticles = [];
        auroraPoints = [];
        const count = Math.floor(width * height * 0.00025);
        for (let i = 0; i < count; i++) {
          galaxyStars.push({
            x: Math.random() * width,
            y: Math.random() * height,
            radius: Math.random() * 2.2 + 0.3,
            brightness: Math.random() * 0.7 + 0.3,
            twinkleSpeed: Math.random() * 0.02 + 0.005,
            phase: Math.random() * Math.PI * 2,
            depth: Math.random() * 0.8 + 0.2
          });
        }
        // Nebula floating dust
        for (let i = 0; i < 150; i++) {
          nebulaParticles.push({
            x: Math.random() * width,
            y: Math.random() * height,
            radius: Math.random() * 60 + 20,
            alpha: Math.random() * 0.06,
            color: `rgba(180, 130, 255, ${Math.random()*0.04})`,
            vx: (Math.random() - 0.5) * 0.2,
            vy: (Math.random() - 0.5) * 0.2
          });
        }
        // Aurora base points
        for (let i = 0; i < 30; i++) {
          auroraPoints.push({
            x: Math.random() * width,
            baseY: height * (0.2 + Math.random() * 0.25),
            amp: Math.random() * 30 + 15,
            freq: Math.random() * 0.02 + 0.01,
            phase: Math.random() * Math.PI*2
          });
        }
      }

      function drawGalaxy() {
        ctxGalaxy.clearRect(0, 0, width, height);
        
        // Deep space gradient
        const grad = ctxGalaxy.createRadialGradient(width/2, height/2, 0, width/2, height/2, width*0.9);
        grad.addColorStop(0, '#0a0a20');
        grad.addColorStop(0.5, '#030314');
        grad.addColorStop(1, '#01010a');
        ctxGalaxy.fillStyle = grad;
        ctxGalaxy.fillRect(0, 0, width, height);
        
        // Nebula dust
        nebulaParticles.forEach(p => {
          ctxGalaxy.beginPath();
          ctxGalaxy.arc(p.x, p.y, p.radius, 0, Math.PI*2);
          ctxGalaxy.fillStyle = p.color;
          ctxGalaxy.fill();
          p.x += p.vx;
          p.y += p.vy;
          if (p.x < 0) p.x = width;
          if (p.x > width) p.x = 0;
          if (p.y < 0) p.y = height;
          if (p.y > height) p.y = 0;
        });
        
        // Aurora glow
        ctxGalaxy.save();
        ctxGalaxy.globalCompositeOperation = 'screen';
        for (let i = 0; i < auroraPoints.length; i++) {
          const p = auroraPoints[i];
          const yOffset = Math.sin(Date.now() * p.freq + p.phase) * p.amp;
          const gradAurora = ctxGalaxy.createLinearGradient(p.x, p.baseY - 40, p.x, p.baseY + 40);
          gradAurora.addColorStop(0, 'rgba(100, 200, 180, 0)');
          gradAurora.addColorStop(0.5, 'rgba(160, 210, 200, 0.08)');
          gradAurora.addColorStop(1, 'rgba(80, 150, 170, 0)');
          ctxGalaxy.fillStyle = gradAurora;
          ctxGalaxy.fillRect(p.x - 25, p.baseY + yOffset - 45, 50, 90);
        }
        ctxGalaxy.restore();
        
        // Stars with twinkling
        const now = Date.now() * 0.001;
        galaxyStars.forEach(s => {
          const twinkle = Math.sin(now * s.twinkleSpeed * 10 + s.phase) * 0.3 + 0.7;
          const alpha = s.brightness * twinkle * 0.9;
          ctxGalaxy.beginPath();
          ctxGalaxy.arc(s.x, s.y, s.radius, 0, 2*Math.PI);
          ctxGalaxy.fillStyle = `rgba(255, 240, 200, ${alpha})`;
          ctxGalaxy.fill();
          if (s.radius > 1.6) {
            ctxGalaxy.shadowColor = 'rgba(255, 220, 180, 0.7)';
            ctxGalaxy.shadowBlur = s.radius * 3;
            ctxGalaxy.fill();
            ctxGalaxy.shadowBlur = 0;
          }
        });
        
        // Shooting stars random
        if (Math.random() < 0.02) {
          shootingStars.push({
            x: Math.random() * width * 0.7,
            y: Math.random() * height * 0.4,
            length: Math.random() * 90 + 40,
            speed: Math.random() * 8 + 5,
            life: 1,
            angle: Math.PI/4 + (Math.random()-0.5)*0.3
          });
        }
        shootingStars.forEach((s, idx) => {
          s.x += Math.cos(s.angle) * s.speed;
          s.y += Math.sin(s.angle) * s.speed;
          s.life -= 0.015;
          ctxGalaxy.beginPath();
          ctxGalxy.moveTo(s.x, s.y);
          const endX = s.x - Math.cos(s.angle) * s.length;
          const endY = s.y - Math.sin(s.angle) * s.length;
          ctxGalaxy.lineTo(endX, endY);
          ctxGalaxy.strokeStyle = `rgba(255,255,255,${s.life})`;
          ctxGalaxy.lineWidth = 1.8;
          ctxGalaxy.stroke();
          if (s.life <= 0 || s.x > width+50 || s.y > height+50) shootingStars.splice(idx,1);
        });
        
        requestAnimationFrame(() => drawGalaxy());
      }

      // ──────────────── SCENE MANAGEMENT ────────────────
      function renderScene(sceneId) {
        APP.innerHTML = '';
        switch(sceneId) {
          case 'intro': createIntroScene(); break;
          case 'heart': createHeartScene(); break;
          case 'countdown': createCountdownScene(); break;
          case 'gift': createGiftScene(); break;
          case 'timeline': createTimelineScene(); break;
          case 'stars': createInteractiveStarsScene(); break;
          case 'letter': createLetterScene(); break;
          case 'roseRain': createRoseRainScene(); break;
          case 'final': createFinalScene(); break;
          default: createIntroScene();
        }
      }

      // ──────────────── INTRO SCENE ────────────────
      function createIntroScene() {
        initAudio();
        const scene = document.createElement('div');
        scene.className = 'scene';
        scene.innerHTML = `
          <div class="glass-panel" style="max-width:700px; width:90%; opacity:0; transform: scale(0.96);" id="intro-panel">
            <h1 style="font-size: clamp(2.8rem, 8vw, 4.5rem); margin-bottom:0.8rem; color:#fbe9d7; text-shadow:0 0 30px #d4af37;">✨ A Starlit Moment ✨</h1>
            <div id="typed-intro" style="font-size:1.5rem; min-height:3rem; color:#e0d6c2;"></div>
          </div>
        `;
        APP.appendChild(scene);
        
        const panel = document.getElementById('intro-panel');
        gsap.to(panel, { opacity:1, scale:1, duration:2, ease:'power3.out', delay:0.8 });
        
        new Typed('#typed-intro', {
          strings: ['For someone who lights up the world...', 'A journey through time and stars.'],
          typeSpeed: 50,
          backSpeed: 25,
          startDelay: 1800,
          backDelay: 2000,
          showCursor: true,
          cursorChar: '🌙',
          onComplete: () => {
            setTimeout(() => {
              gsap.to(scene, { opacity:0, duration:1.2, onComplete: ()=> renderScene('heart') });
            }, 2500);
          }
        });
      }

      // ──────────────── HEART PORTAL ────────────────
      function createHeartScene() {
        const scene = document.createElement('div');
        scene.className = 'scene';
        scene.innerHTML = `<canvas id="heartCanvas" width="400" height="400" class="interactive"></canvas>
          <p style="color:#e5d5b0; margin-top:1rem; letter-spacing:2px;">touch the heart</p>`;
        APP.appendChild(scene);
        
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        const w = canvas.width, h = canvas.height;
        let particles = [];
        let heartPulse = 0;
        
        function heartShape(t) {
          const x = 16 * Math.pow(Math.sin(t), 3);
          const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
          return {x: x*7.5 + w/2, y: -y*7.5 + h/2.3};
        }
        
        function drawHeartParticles() {
          ctx.clearRect(0,0,w,h);
          for (let i=0; i<400; i++) {
            const t = (i/400)*Math.PI*2;
            const base = heartShape(t);
            const offsetX = (Math.random()-0.5)*4;
            const offsetY = (Math.random()-0.5)*4;
            ctx.beginPath();
            ctx.arc(base.x+offsetX, base.y+offsetY, 2.5, 0, 2*Math.PI);
            ctx.fillStyle = `rgba(255, ${100+Math.sin(Date.now()*0.01+i)*30}, 140, 0.9)`;
            ctx.fill();
            ctx.shadowColor = '#ff3366';
            ctx.shadowBlur = 12;
            ctx.fill();
            ctx.shadowBlur = 0;
          }
          requestAnimationFrame(drawHeartParticles);
        }
        drawHeartParticles();
        
        canvas.addEventListener('click', () => {
          heartbeatSound();
          confetti({ particleCount: 200, spread: 120, origin: {y:0.5}, colors: ['#ffd700','#ff6b9d','#b8860b'] });
          gsap.to(scene, { opacity:0, duration:1, onComplete: ()=> renderScene('countdown') });
        });
      }

      // ──────────────── COUNTDOWN ────────────────
      function createCountdownScene() {
        const scene = document.createElement('div');
        scene.className = 'scene';
        scene.innerHTML = `<div class="glass-panel" id="countdown-panel"><h2 style="font-size:3rem;">Get ready...</h2></div>`;
        APP.appendChild(scene);
        const panel = document.getElementById('countdown-panel');
        const texts = ['3', '2', '1'];
        let i=0;
        function showNext() {
          if (i<texts.length) {
            panel.innerHTML = `<h2 style="font-size:6rem; color:#f7e05e;">${texts[i]}</h2>`;
            gsap.from(panel, {scale:2, opacity:0, duration:0.5, ease:'back'});
            if (i===2) {
              setTimeout(()=>{
                confetti({particleCount:300, spread:150});
                gsap.to(scene, {opacity:0, duration:0.9, onComplete:()=>renderScene('gift')});
              },600);
            }
            i++;
            setTimeout(showNext, 1000);
          }
        }
        showNext();
      }

      // ──────────────── GIFT BOX ────────────────
      function createGiftScene() {
        const scene = document.createElement('div');
        scene.className = 'scene';
        scene.innerHTML = `
          <div class="glass-panel interactive" id="gift-box" style="padding:3rem; background:rgba(20,15,30,0.7);">
            <div style="font-size:5rem;">🎁</div>
            <p style="margin-top:1rem;">open with love</p>
          </div>`;
        APP.appendChild(scene);
        document.getElementById('gift-box').addEventListener('click', ()=>{
          playTone(600,'sine',0.2);
          confetti({particleCount:250, spread:100, origin:{y:0.4}});
          gsap.to(scene, {opacity:0, duration:1.2, onComplete:()=>renderScene('timeline')});
        });
      }

      // ──────────────── TIMELINE ────────────────
      function createTimelineScene() {
        const scene = document.createElement('div');
        scene.className = 'scene';
        scene.innerHTML = `<div class="glass-panel" id="timeline-text" style="font-size:2rem;">2026 ...</div>`;
        APP.appendChild(scene);
        const el = document.getElementById('timeline-text');
        const years = [2026,2025,2024,2020,2015,2010,2009];
        let idx=0;
        function showYear(){
          if(idx<years.length){
            el.textContent = years[idx];
            gsap.fromTo(el, {scale:2, opacity:0}, {scale:1, opacity:1, duration:0.4});
            idx++;
            setTimeout(showYear, idx===years.length-1? 1200:350);
          } else {
            el.innerHTML = '<span style="color:#ffd966;">✨ 12 July 2009 ✨</span><br><span style="font-size:1.3rem;">The day the world became brighter</span>';
            setTimeout(()=> gsap.to(scene,{opacity:0,duration:1.5, onComplete:()=>renderScene('stars')}), 2800);
          }
        }
        showYear();
      }

      // ──────────────── INTERACTIVE STARS ────────────────
      function createInteractiveStarsScene() {
        const scene = document.createElement('div');
        scene.className = 'scene';
        scene.innerHTML = `<div id="stars-grid" style="display:flex; flex-wrap:wrap; justify-content:center; gap:2rem; max-width:700px;"></div>`;
        APP.appendChild(scene);
        const grid = document.getElementById('stars-grid');
        const messages = ["You are a light","Kind soul","Beautiful memories","Endless grace","Warm heart","True friend","Radiant joy"];
        for(let i=0;i<80;i++){
          const star = document.createElement('div');
          star.className = 'interactive';
          star.style.fontSize = '2rem';
          star.textContent = '⭐';
          star.style.filter = 'drop-shadow(0 0 12px gold)';
          star.addEventListener('click', (e)=>{
            const msg = messages[i%messages.length];
            confetti({particleCount:70, spread:60, origin:{x:e.clientX/width, y:e.clientY/height}});
            alert(`✨ ${msg} ✨`);
          });
          grid.appendChild(star);
        }
        setTimeout(()=> gsap.to(scene,{opacity:0,duration:1.5, onComplete:()=>renderScene('letter')}), 10000);
      }

      // ──────────────── LETTER ────────────────
      function createLetterScene() {
        const scene = document.createElement('div');
        scene.className = 'scene';
        scene.innerHTML = `<div class="glass-panel" style="max-width:600px; background:rgba(245,240,230,0.1);">
          <p style="font-family:'Cormorant Garamond'; font-size:1.8rem; line-height:1.6;">Dear Manar,<br>May your days be filled with wonder and your heart with peace. You deserve all the beauty this universe holds.</p>
        </div>`;
        APP.appendChild(scene);
        setTimeout(()=> gsap.to(scene,{opacity:0,duration:1.8, onComplete:()=>renderScene('roseRain')}), 7000);
      }

      // ──────────────── ROSE RAIN ────────────────
      function createRoseRainScene() {
        const scene = document.createElement('div');
        scene.className = 'scene';
        for(let i=0;i<50;i++){
          const rose = document.createElement('div');
          rose.textContent = '🌹';
          rose.style.position = 'absolute';
          rose.style.left = Math.random()*100+'%';
          rose.style.top = '-5%';
          rose.style.fontSize = '2rem';
          rose.style.animation = `fall ${3+Math.random()*4}s linear infinite`;
          scene.appendChild(rose);
        }
        APP.appendChild(scene);
        setTimeout(()=> gsap.to(scene,{opacity:0,duration:1.5, onComplete:()=>renderScene('final')}), 5000);
      }

      // ──────────────── FINAL SCENE ────────────────
      function createFinalScene() {
        const scene = document.createElement('div');
        scene.className = 'scene';
        scene.innerHTML = `<div class="glass-panel"><h1 style="font-size:4rem;">Happy Birthday<br>Manar</h1><p style="margin-top:1rem;">Forever cherished, endlessly celebrated.</p></div>`;
        APP.appendChild(scene);
        setInterval(()=> confetti({particleCount:50, spread:70}), 2000);
      }

      // ──────────────── START ────────────────
      window.addEventListener('resize', resizeCanvases);
      resizeCanvases();
      drawGalaxy();
      renderScene('intro');
      
      // Style injection for rose fall
      const style = document.createElement('style');
      style.textContent = `@keyframes fall{0%{transform:translateY(0) rotate(0deg); opacity:1} 100%{transform:translateY(110vh) rotate(360deg); opacity:0.7}}`;
      document.head.appendChild(style);
    })();
  </script>
</body>
</html>
